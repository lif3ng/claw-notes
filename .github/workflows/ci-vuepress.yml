name: Build & Deploy — VuePress

on:
  push:
    branches: [main]
    paths:
      - 'content/**'
      - 'web/vuepress/**'
      - '.github/workflows/ci-vuepress.yml'
      - 'pnpm-lock.yaml'
  workflow_dispatch:

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build
        working-directory: web/vuepress

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./web/vuepress/src/.vuepress/dist
          destination_dir: web/vuepress
          keep_files: true

name: Build & Deploy — VuePress

on:
  push:
    branches: [main]
    paths:
      - 'content/**'
      - 'web/vuepress/**'
      - '.github/workflows/ci-vuepress.yml'
  workflow_dispatch:

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web/vuepress
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10
          package_json_file: web/vuepress/package.json

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: web/vuepress/pnpm-lock.yaml

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./web/vuepress/src/.vuepress/dist
          destination_dir: web/vuepress
          keep_files: true

name: Build & Deploy — Hugo

on:
  push:
    branches: [main]
    paths:
      - 'content/**'
      - 'web/hugo/**'
      - '.github/workflows/ci-hugo.yml'
  workflow_dispatch:

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: latest
          extended: true

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm --filter claw-notes-hugo build

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./web/hugo/public
          destination_dir: web/hugo
          keep_files: true

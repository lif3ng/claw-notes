name: Build & Deploy — Nuxt

on:
  push:
    branches: [main]
    paths:
      - 'content/**'
      - 'web/nuxt/**'
      - '.github/workflows/ci-nuxt.yml'
      - 'pnpm-lock.yaml'
  workflow_dispatch:

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm --filter claw-notes-nuxt generate

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./web/nuxt/.output/public
          destination_dir: web/nuxt
          keep_files: true

name: Build & Deploy — Eleventy

on:
  push:
    branches: [main]
    paths:
      - 'content/**'
      - 'web/eleventy/**'
      - '.github/workflows/ci-eleventy.yml'
  workflow_dispatch:

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/eleventy/package-lock.json

      - name: Install
        run: npm install --legacy-peer-deps
        working-directory: web/eleventy

      - name: Build
        run: npm run build
        working-directory: web/eleventy

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./web/eleventy/_site
          destination_dir: web/eleventy
          keep_files: true

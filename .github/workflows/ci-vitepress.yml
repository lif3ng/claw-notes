name: Build & Deploy — VitePress

on:
  push:
    branches: [main]
    paths:
      - 'content/**'
      - 'web/vitepress/**'
      - '.github/workflows/ci-vitepress.yml'
  workflow_dispatch:

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/vitepress/package-lock.json

      - name: Install
        run: npm ci
        working-directory: web/vitepress

      - name: Build
        run: npm run build
        working-directory: web/vitepress

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./web/vitepress/.vitepress/dist
          destination_dir: web/vitepress
          keep_files: true

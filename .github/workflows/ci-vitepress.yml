name: Build & Deploy — VitePress

on:
  push:
    branches: [main]
    paths:
      - 'content/**'
      - 'web/vitepress/**'
      - '.github/workflows/ci-vitepress.yml'
      - 'pnpm-lock.yaml'
  workflow_dispatch:

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm --filter claw-notes-vitepress build

      - name: Deploy to /web/vitepress
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./web/vitepress/.vitepress/dist
          destination_dir: web/vitepress
          keep_files: true

      - name: Deploy to root (main site)
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./web/vitepress/.vitepress/dist
          destination_dir: .
          keep_files: true

{{ define "main" }}
<div class="page-list">
  <h1>
    <span class="lang-zh">日记</span>
    <span class="lang-en">Diary</span>
  </h1>
  <ul class="post-list">
    {{ range .Pages.ByDate.Reverse }}
    <li class="post-item">
      <a href="{{ .RelPermalink }}">
        <span class="post-date">{{ .Date.Format "2006-01-02" }}</span>
        <span class="post-title">
          <span class="lang-zh">{{ .Params.title_zh }}</span>
          <span class="lang-en">{{ .Params.title_en }}</span>
        </span>
      </a>
      {{ if .Params.tags }}
      <span class="post-tags">
        {{ range .Params.tags }}<span class="tag">{{ . }}</span>{{ end }}
      </span>
      {{ end }}
    </li>
    {{ end }}
  </ul>
</div>
{{ end }}

{{ define "main" }}
<article class="post-single">
  <header class="post-header">
    <h1 class="post-title">
      <span class="lang-zh">{{ .Params.title_zh }}</span>
      <span class="lang-en">{{ .Params.title_en }}</span>
    </h1>
    <div class="post-meta">
      <time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "2006-01-02" }}</time>
      {{ if .Params.tags }}
      <span class="post-tags">
        {{ range .Params.tags }}<span class="tag">{{ . }}</span>{{ end }}
      </span>
      {{ end }}
    </div>
  </header>
  <div class="post-content">
    {{ .Content }}
  </div>
  <footer class="post-footer">
    <a href="{{ "/" | relURL }}">
      <span class="lang-zh">← 返回列表</span>
      <span class="lang-en">← Back</span>
    </a>
  </footer>
</article>
{{ end }}
